<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="referrer" content="no-referrer" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#346DDB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="MerchantPay" />
  <title>MerchantPay 앱 설치</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    :root{ --brand:#346DDB; --brand-d:#2557b5; }
    *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body{ font-family:"Pretendard","Segoe UI","Malgun Gothic",system-ui,sans-serif; color:#1d2433;
      min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:28px 22px calc(28px + env(safe-area-inset-bottom));
      background:linear-gradient(160deg,#5b8cf0,#2557b5); }
    .card{ width:100%; max-width:420px; background:#fff; border-radius:24px; padding:34px 26px 28px;
      box-shadow:0 20px 50px rgba(0,0,0,.28); text-align:center; }
    .corp{ color:var(--brand); font-weight:800; font-size:18px; letter-spacing:-.5px; margin-bottom:18px; }
    .app-icon{ width:96px; height:96px; border-radius:24px; display:block; margin:0 auto 16px;
      box-shadow:0 10px 26px rgba(52,109,219,.4); }
    h1{ font-size:26px; font-weight:800; letter-spacing:-1px; margin-bottom:6px; }
    .sub{ color:#6b7689; font-size:14px; margin-bottom:24px; }
    .btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:17px;
      border:none; border-radius:15px; font-size:17px; font-weight:700; cursor:pointer; transition:.15s; }
    .btn-primary{ background:var(--brand); color:#fff; }
    .btn-primary:active{ transform:scale(.98); background:var(--brand-d); }
    .btn-ghost{ background:#eef2fb; color:var(--brand); margin-top:11px; }
    .btn:disabled{ opacity:.5; cursor:default; }
    .feat{ display:flex; justify-content:center; gap:20px; margin:22px 0 6px; color:#6b7689; font-size:12.5px; }
    .feat div{ display:flex; flex-direction:column; align-items:center; gap:5px; }
    .feat .fi{ font-size:21px; }
    .status{ margin-top:16px; font-size:13px; color:#6b7689; min-height:18px; }
    .status.ok{ color:#1aa86b; font-weight:600; }
    /* iOS 안내 시트 */
    .sheet{ position:fixed; inset:0; background:rgba(15,21,37,.55); display:none; align-items:flex-end; z-index:50; }
    .sheet.show{ display:flex; }
    .sheet-inner{ background:#fff; width:100%; border-radius:22px 22px 0 0; padding:24px 24px calc(30px + env(safe-area-inset-bottom)); animation:up .25s ease; }
    @keyframes up{ from{ transform:translateY(100%);} to{ transform:translateY(0);} }
    .sheet h2{ font-size:18px; margin-bottom:16px; }
    .step{ display:flex; align-items:center; gap:13px; padding:11px 0; border-bottom:1px solid #eef0f5; text-align:left; }
    .step:last-child{ border:none; }
    .step .n{ width:26px; height:26px; flex:none; border-radius:50%; background:var(--brand); color:#fff;
      display:grid; place-items:center; font-size:13px; font-weight:700; }
    .step .t{ font-size:14.5px; }
    .step .t b{ color:var(--brand); }
    .sheet .close{ width:100%; margin-top:18px; padding:14px; border:none; border-radius:13px; background:#eef2fb; color:var(--brand); font-size:15px; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="corp">Qronix</div>
    <img class="app-icon" src="icon-512.png" alt="MerchantPay" />
    <h1>MerchantPay</h1>
    <div class="sub">가맹점 결제 단말 · 앱으로 설치하세요</div>

    <button class="btn btn-primary" id="installBtn">
      <span id="btnIcon">⬇</span><span id="btnLabel">홈 화면에 추가</span>
    </button>
    <button class="btn btn-ghost" id="openBtn">웹으로 바로 사용</button>

    <div class="feat">
      <div><span class="fi">⚡</span>빠른 실행</div>
      <div><span class="fi">📶</span>오프라인</div>
      <div><span class="fi">🔒</span>생체인증</div>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="sheet" id="iosSheet">
    <div class="sheet-inner">
      <h2>아이폰 설치 방법 (Safari)</h2>
      <div class="step"><div class="n">1</div><div class="t">하단 가운데 <b>공유 버튼</b> 탭 (□ 위 ↑ 모양)</div></div>
      <div class="step"><div class="n">2</div><div class="t">메뉴를 내려 <b>"홈 화면에 추가"</b> 탭</div></div>
      <div class="step"><div class="n">3</div><div class="t">오른쪽 위 <b>"추가"</b> 탭 → 완료</div></div>
      <button class="close" id="iosClose">확인</button>
    </div>
  </div>

  <script>
    'use strict';
    var deferredPrompt = null;
    var ua = navigator.userAgent || '';
    var isIOS = /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

    var installBtn = document.getElementById('installBtn');
    var openBtn = document.getElementById('openBtn');
    var statusEl = document.getElementById('status');
    var btnLabel = document.getElementById('btnLabel');
    var btnIcon = document.getElementById('btnIcon');
    var iosSheet = document.getElementById('iosSheet');

    function setStatus(msg, ok){ statusEl.textContent = msg || ''; statusEl.className = 'status' + (ok ? ' ok' : ''); }

    openBtn.addEventListener('click', function(){ location.href = 'index.html'; });
    document.getElementById('iosClose').addEventListener('click', function(){ iosSheet.classList.remove('show'); });

    // 이미 설치되어 앱으로 실행 중
    if (isStandalone) {
      btnLabel.textContent = '앱 실행';
      btnIcon.textContent = '▶';
      setStatus('이미 설치된 앱으로 실행 중입니다.', true);
      installBtn.addEventListener('click', function(){ location.href = 'index.html'; });
    } else {
      // Android/지원 브라우저: 설치 가능 시점 이벤트 캡처
      window.addEventListener('beforeinstallprompt', function(e){
        e.preventDefault();
        deferredPrompt = e;
        setStatus('설치 준비 완료 — 버튼을 누르세요.');
      });
      window.addEventListener('appinstalled', function(){
        deferredPrompt = null;
        setStatus('설치되었습니다! 홈 화면에서 실행하세요.', true);
      });

      installBtn.addEventListener('click', async function(){
        if (deferredPrompt) {
          deferredPrompt.prompt();
          var choice = await deferredPrompt.userChoice;
          deferredPrompt = null;
          if (choice && choice.outcome === 'accepted') setStatus('설치되었습니다! 홈 화면을 확인하세요.', true);
          else setStatus('설치가 취소되었습니다. 다시 시도할 수 있어요.');
        } else if (isIOS) {
          iosSheet.classList.add('show');
        } else {
          setStatus('브라우저 메뉴(⋮)의 "앱 설치"를 사용하거나, 잠시 후 다시 눌러주세요.');
        }
      });

      if (isIOS) setStatus('아이폰은 버튼을 누르면 설치 방법을 안내합니다.');
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){ navigator.serviceWorker.register('service-worker.js').catch(function(){}); });
    }
  </script>
</body>
</html>
