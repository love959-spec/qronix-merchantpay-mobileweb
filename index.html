<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="referrer" content="no-referrer" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#346DDB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MerchantPay" />
  <title>MerchantPay · 가맹점 결제</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2" />
  <link rel="stylesheet" href="styles.css" />
  <!-- QR/바코드 스캐너 (휴대폰 카메라 사용) — SRI 무결성 검증 -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer
    integrity="sha384-c9d8RFSL+u3exBOJ4Yp3HUJXS4znl9f+z66d1y54ig+ea249SpqR+w1wyvXz/lk+"
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- QR 생성 (구글 OTP 등록용) — SRI 무결성 검증 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js" defer
    integrity="sha384-8FWZA6BGMXhsfO+BLtrJK0We6gg5o1JyO8xQm6peWDEUs17ACA5ziE/NIAkl9z2k"
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <div id="app"></div>
  <!-- 슬라이드 메뉴(네비게이션) -->
  <div id="drawer-backdrop" class="drawer-backdrop hidden"></div>
  <nav id="drawer" class="drawer hidden" aria-label="메뉴"></nav>

  <!-- 하단 네비게이션 바 (모바일) -->
  <nav id="bottomnav" class="bottomnav hidden" aria-label="하단 메뉴"></nav>
  <!-- 토스트 -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js').catch(() => {}));
    }
  </script>
</body>
</html>
