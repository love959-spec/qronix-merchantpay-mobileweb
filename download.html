<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="referrer" content="no-referrer" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#346DDB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="MerchantPay" />
  <title>MerchantPay 다운로드</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    :root{ --brand:#346DDB; --brand-d:#2557b5; --ink:#1d2433; --muted:#6b7689; }
    *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body{ font-family:"Pretendard","Segoe UI","Malgun Gothic",system-ui,sans-serif; color:var(--ink);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:28px 18px calc(28px + env(safe-area-inset-bottom));
      background:linear-gradient(160deg,#5b8cf0,#2557b5); }
    .wrap{ width:100%; max-width:680px; background:#fff; border-radius:26px; padding:30px 24px 26px;
      box-shadow:0 22px 54px rgba(0,0,0,.28); }
    .head{ text-align:center; margin-bottom:24px; }
    .head .corp{ color:var(--brand); font-weight:800; font-size:16px; }
    .head h1{ font-size:24px; font-weight:800; letter-spacing:-.5px; margin:5px 0 5px; }
    .head p{ color:var(--muted); font-size:14px; }
    .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; }
    .card{ border:1px solid #e4e9f3; border-radius:18px; padding:24px 18px; text-align:center; transition:.15s; }
    .card:hover{ border-color:var(--brand); box-shadow:0 8px 22px rgba(52,109,219,.12); }
    .icon{ width:80px; height:80px; margin:0 auto 14px; display:block; border-radius:20px; }
    .card h2{ font-size:17px; font-weight:800; }
    .card .desc{ color:var(--muted); font-size:13px; margin:7px 0 9px; min-height:34px; }
    .tag{ display:inline-block; font-size:11.5px; color:#185FA5; background:#E6F1FB; padding:4px 12px; border-radius:999px; margin-bottom:16px; }
    .btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px;
      border:none; border-radius:13px; font-size:15px; font-weight:700; cursor:pointer;
      background:var(--brand); color:#fff; text-decoration:none; transition:.12s; }
    .btn:active{ transform:scale(.98); background:var(--brand-d); }
    .btn:disabled{ opacity:.5; cursor:default; }
    .btn-link{ display:block; margin-top:11px; color:var(--brand); font-size:13px; text-decoration:none; cursor:pointer; }
    .st{ font-size:12px; color:var(--muted); margin-top:9px; min-height:16px; }
    .st.ok{ color:#1aa86b; font-weight:600; }
    .foot{ display:flex; justify-content:center; gap:24px; margin-top:24px; color:var(--muted); font-size:12.5px; }
    .foot span{ display:flex; align-items:center; gap:5px; }
    .foot svg{ width:16px; height:16px; }
    .sheet{ position:fixed; inset:0; background:rgba(15,21,37,.55); display:none; align-items:flex-end; z-index:50; }
    .sheet.show{ display:flex; }
    .sheet-inner{ background:#fff; width:100%; max-width:680px; margin:0 auto; border-radius:22px 22px 0 0; padding:24px 24px calc(30px + env(safe-area-inset-bottom)); animation:up .25s ease; }
    @keyframes up{ from{ transform:translateY(100%);} to{ transform:translateY(0);} }
    .sheet h3{ font-size:18px; margin-bottom:16px; }
    .step{ display:flex; align-items:center; gap:13px; padding:11px 0; border-bottom:1px solid #eef0f5; text-align:left; }
    .step:last-of-type{ border:none; }
    .step .n{ width:26px; height:26px; flex:none; border-radius:50%; background:var(--brand); color:#fff; display:grid; place-items:center; font-size:13px; font-weight:700; }
    .step .t{ font-size:14.5px; } .step .t b{ color:var(--brand); }
    .sheet .close{ width:100%; margin-top:18px; padding:14px; border:none; border-radius:13px; background:#eef2fb; color:var(--brand); font-size:15px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="corp">Qronix</div>
      <h1>MerchantPay 설치</h1>
      <p>사용 환경에 맞는 버전을 선택해 설치하세요</p>
    </div>

    <div class="grid">
      <div class="card">
        <img class="icon" src="icon-512.png" alt="모바일 앱 아이콘" />
        <h2>모바일 앱</h2>
        <div class="desc">휴대폰 전용<br>최적화 레이아웃</div>
        <span class="tag">휴대폰 추천</span>
        <button class="btn" id="mobBtn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 11l5 5 5-5"/><path d="M5 21h14"/></svg>
          설치하기
        </button>
        <div class="st" id="mobSt"></div>
      </div>

      <div class="card">
        <img class="icon" src="web-icon.png" alt="반응형 웹 아이콘" />
        <h2>반응형 웹</h2>
        <div class="desc">PC · 태블릿 · 휴대폰<br>모두 지원</div>
        <span class="tag">어떤 기기든</span>
        <button class="btn" id="webBtn">홈 화면에 추가</button>
        <div class="st" id="webSt"></div>
      </div>
    </div>

    <div class="foot">
      <span><svg viewBox="0 0 24 24" fill="none" stroke="#6b7689" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg>빠른 실행</span>
      <span><svg viewBox="0 0 24 24" fill="none" stroke="#6b7689" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5a9 9 0 0 1 14 0"/><path d="M8.5 16a4.5 4.5 0 0 1 7 0"/><circle cx="12" cy="19" r="1"/></svg>오프라인</span>
      <span><svg viewBox="0 0 24 24" fill="none" stroke="#6b7689" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>생체인증</span>
    </div>
  </div>

  <div class="sheet" id="iosSheet">
    <div class="sheet-inner">
      <h3 id="iosTitle">아이폰 설치 방법 (Safari)</h3>
      <div class="step"><div class="n">1</div><div class="t">하단 가운데 <b>공유 버튼</b> 탭 (□ 위 ↑ 모양)</div></div>
      <div class="step"><div class="n">2</div><div class="t">메뉴를 내려 <b>"홈 화면에 추가"</b> 탭</div></div>
      <div class="step"><div class="n">3</div><div class="t">오른쪽 위 <b>"추가"</b> 탭 → 완료</div></div>
      <button class="close" id="iosClose">확인</button>
    </div>
  </div>

  <script>
    'use strict';
    var ua = navigator.userAgent || '';
    var isIOS = /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
    var WEB_APP = 'https://love959-spec.github.io/qronix-MerchantPay/';
    var deferredPrompt = null;

    var webBtn = document.getElementById('webBtn');
    var mobBtn = document.getElementById('mobBtn');
    var webSt = document.getElementById('webSt');
    var mobSt = document.getElementById('mobSt');
    var iosSheet = document.getElementById('iosSheet');
    function set(el, msg, ok){ el.textContent = msg || ''; el.className = 'st' + (ok ? ' ok' : ''); }

    window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt = e; set(mobSt, '설치 준비 완료 — 버튼을 누르세요.'); });
    window.addEventListener('appinstalled', function(){ deferredPrompt = null; set(mobSt, '설치되었습니다! 홈 화면을 확인하세요.', true); });

    document.getElementById('iosClose').addEventListener('click', function(){ iosSheet.classList.remove('show'); });

    // 모바일 앱: 같은 경로 → 바로 설치
    mobBtn.addEventListener('click', async function(){
      if (deferredPrompt) {
        deferredPrompt.prompt();
        var c = await deferredPrompt.userChoice; deferredPrompt = null;
        set(mobSt, c && c.outcome === 'accepted' ? '설치되었습니다! 홈 화면을 확인하세요.' : '설치가 취소되었습니다.', c && c.outcome === 'accepted');
      } else if (isIOS) {
        iosSheet.classList.add('show');
      } else {
        set(mobSt, '브라우저 메뉴(⋮)의 "앱 설치"를 사용하거나 잠시 후 다시 눌러주세요.');
      }
    });

    // 반응형 웹: 다른 도메인(scope) → 직접 설치 불가 → 웹 앱의 원탭 설치 화면으로 연결
    webBtn.addEventListener('click', function(){
      set(webSt, '웹 설치 화면을 엽니다…');
      location.href = WEB_APP + 'install.html';
    });

    if (isIOS) set(mobSt, '아이폰은 버튼을 누르면 설치 방법을 안내합니다.');

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){ navigator.serviceWorker.register('service-worker.js').catch(function(){}); });
    }
  </script>
</body>
</html>
